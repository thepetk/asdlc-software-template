name: Template Render Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  render-test:
    name: "${{ matrix.agentType }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        agentType: [claude, cursor, gemini]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Install render script dependencies
        run: pip install jinja2 pyyaml

      - name: Render skeleton and validate YAML
        run: |
          python tests/render_skeleton.py \
            --values tests/ci-values.yaml \
            --set agentType=${{ matrix.agentType }} \
            --set name=ci-${{ matrix.agentType }} \
            --output /tmp/ci-manifests \
            --ci
