# Minimal OpenShift Route CRD stub for minikube.
# Registers the routes.route.openshift.io API so kubectl apply succeeds
# when the rendered openclaw manifests include a Route resource.
# There is no Route controller — the object is stored but not reconciled.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: routes.route.openshift.io
spec:
  group: route.openshift.io
  scope: Namespaced
  names:
    plural: routes
    singular: route
    kind: Route
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          x-kubernetes-preserve-unknown-fields: true
