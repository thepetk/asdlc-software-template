apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: paude-agent-role
  title: Paude Agent Role
  description: Define and register a reusable agent role in RHDH.
  tags: ["ai", "agent", "role", "paude"]
  annotations:
    backstage.io/techdocs-ref: dir:.
spec:
  type: service
  owner: rhdh-pai
  parameters:
    - title: Role Information
      required:
        - name
        - owner
        - title
        - agentType
        - systemPrompt
      properties:
        name:
          title: Name
          type: string
          description: Unique name for this role
          ui:autofocus: true
          ui:field: EntityNamePicker
          maxLength: 63
        owner:
          title: Owner
          type: string
          description: Owner of the role
          default: user:guest
          ui:field: OwnerPicker
          ui:options: {}
        title:
          title: Role Title
          type: string
          description: Human-readable title for this role (e.g. "Software Engineer")
        agentType:
          title: Agent Type
          type: string
          description: The AI agent that will use this role
          enum:
            - claude
            - gemini
            - cursor
          enumNames:
            - Claude Code
            - Gemini CLI
            - Cursor
          default: claude
        systemPrompt:
          title: System Prompt
          type: string
          description: The full system prompt / persona instructions for the agent
          ui:widget: textarea
          ui:options:
            rows: 10

    - title: Repository Information
      required:
        - repoOwner
        - repoName
        - branch
        - githubServer
      properties:
        githubServer:
          title: GitHub Server
          type: string
          default: github.com
          ui:help: "You can also provide an on-prem GitHub server, e.g. github.example.com"
        repoOwner:
          title: Repository Owner
          type: string
          ui:help: The organization or user that this repository will belong to
        repoName:
          title: Repository Name
          type: string
        branch:
          title: Default Branch
          type: string
          default: main

  steps:
    - id: fetch-skeleton
      name: Fetch Skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          owner: ${{ parameters.owner }}
          title: ${{ parameters.title }}
          agentType: ${{ parameters.agentType }}
          systemPrompt: ${{ parameters.systemPrompt }}

    - id: publish-github
      name: Publish Repository to GitHub
      action: publish:github
      input:
        description: Paude agent role ${{ parameters.name }}
        repoUrl: ${{ parameters.githubServer }}?owner=${{ parameters.repoOwner }}&repo=${{ parameters.repoName }}
        defaultBranch: ${{ parameters.branch }}
        protectDefaultBranch: false
        repoVisibility: public

    - id: register
      name: Register
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish-github'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: Repository
        url: ${{ steps['publish-github'].output.remoteUrl }}
      - title: Open Role in Catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
