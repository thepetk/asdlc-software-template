apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: paude-agent-role
  title: Paude Agent Role
  description: Define and register a reusable agent role in RHDH.
  tags: ["ai", "agent", "role", "paude"]
  annotations:
    backstage.io/techdocs-ref: dir:.
spec:
  type: service
  owner: rhdh-pai
  parameters:
    - title: Role Information
      required:
        - name
        - owner
        - title
        - agentType
        - systemPrompt
      properties:
        name:
          title: Name
          type: string
          description: Unique name for this role (e.g. software-engineer-role)
          ui:autofocus: true
          ui:field: EntityNamePicker
          maxLength: 63
        owner:
          title: Owner
          type: string
          description: Owner of the role
          default: user:guest
          ui:field: OwnerPicker
          ui:options: {}
        title:
          title: Role Title
          type: string
          description: Human-readable title for this role (e.g. "Software Engineer")
        agentType:
          title: Agent Type
          type: string
          description: The AI agent that will use this role
          enum:
            - claude
            - gemini
            - cursor
          enumNames:
            - Claude Code
            - Gemini CLI
            - Cursor
          default: claude
        systemPrompt:
          title: System Prompt
          type: string
          description: The full system prompt / persona instructions for the agent
          ui:widget: textarea
          ui:options:
            rows: 10

    - title: Catalog Repository
      description: The role's catalog-info.yaml will be added to this repository via a pull request. Once merged, the role becomes available in the RHDH catalog.
      required:
        - catalogRepoOwner
        - catalogRepoName
        - catalogGithubServer
      properties:
        catalogGithubServer:
          title: GitHub Server
          type: string
          default: github.com
        catalogRepoOwner:
          title: Repository Owner
          type: string
          description: Owner of the catalog repository
        catalogRepoName:
          title: Repository Name
          type: string
          description: Name of the catalog repository (e.g. paude-software-template)

  steps:
    - id: fetch-skeleton
      name: Fetch Skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          owner: ${{ parameters.owner }}
          title: ${{ parameters.title }}
          agentType: ${{ parameters.agentType }}
          systemPrompt: ${{ parameters.systemPrompt }}

    - id: publish-pr
      name: Open Pull Request
      action: publish:github:pull-request
      input:
        repoUrl: ${{ parameters.catalogGithubServer }}?owner=${{ parameters.catalogRepoOwner }}&repo=${{ parameters.catalogRepoName }}
        branchName: add-role-${{ parameters.name }}
        title: "feat: add role ${{ parameters.name }}"
        description: |
          Adds the **${{ parameters.title }}** agent role to the catalog.

          - Agent type: `${{ parameters.agentType }}`

          Merge this PR to make the role available in RHDH.
        sourcePath: .
        targetPath: examples/${{ parameters.name }}

  output:
    links:
      - title: Open Pull Request
        url: ${{ steps['publish-pr'].output.remoteUrl }}
