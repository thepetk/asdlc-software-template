apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ${{ values.name }}
  namespace: ${{ values.namespace }}
  labels:
    app: paude
    paude.io/session-name: ${{ values.name }}
    paude.io/agent: ${{ values.agentType }}
    app.kubernetes.io/name: ${{ values.name }}
    app.kubernetes.io/instance: ${{ values.name }}
spec:
  replicas: 0
  selector:
    matchLabels:
      app: paude
      paude.io/session-name: ${{ values.name }}
  template:
    metadata:
      labels:
        app: paude
        paude.io/session-name: ${{ values.name }}
        paude.io/agent: ${{ values.agentType }}
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      containers:
        - name: agent
          image: ${{ values.name }}:latest
          imagePullPolicy: Always
          command: ["tini", "--", "sleep", "infinity"]
          env:
            - name: PAUDE_WORKSPACE
              value: /pvc/workspace
            - name: PAUDE_AGENT_NAME
              value: ${{ values.agentType }}
            - name: PAUDE_SUPPRESS_PROMPTS
              value: "1"
            - name: PAUDE_WAIT_FOR_GIT
              value: "1"
            - name: PAUDE_ALLOWED_DOMAINS
              value: ${{ values.allowedDomains }}
            {%- if values.agentType in ['cursor', 'gemini'] %}
            - name: NODE_USE_ENV_PROXY
              value: "1"
            {%- endif %}
            {%- if values.yolo %}
            - name: PAUDE_AGENT_ARGS
              value: '-p "$(cat /pvc/TASK.md)" --dangerously-skip-permissions'
            {%- else %}
            - name: PAUDE_AGENT_ARGS
              value: '-p "$(cat /pvc/TASK.md)"'
            {%- endif %}
          resources:
            requests:
              cpu: "1"
              memory: "4Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          volumeMounts:
            - name: workspace
              mountPath: /pvc
            - name: credentials
              mountPath: /credentials
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: ${{ values.name }}-workspace
        - name: credentials
          emptyDir:
            medium: Memory
            sizeLimit: 100Mi
  volumeClaimTemplates: []
