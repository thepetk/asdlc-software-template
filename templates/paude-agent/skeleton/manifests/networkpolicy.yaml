apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ${{ values.name }}-allow-domains
  namespace: ${{ values.namespace }}
  labels:
    app: paude
    paude.io/session-name: ${{ values.name }}
  annotations:
    paude.io/allowed-domains: ${{ values.allowedDomains }}
spec:
  podSelector:
    matchLabels:
      paude.io/session-name: ${{ values.name }}
  policyTypes:
    - Egress
  egress:
    # Allow DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow HTTPS to permitted domains (enforced by the paude network proxy)
    - ports:
        - port: 443
          protocol: TCP
        - port: 80
          protocol: TCP
