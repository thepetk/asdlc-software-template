apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: paude-agent
  title: Paude Agent
  description: Deploy a containerized AI coding agent on OpenShift. Binds a Role (persona), a Task (work to do), and a Paude Project Repository (shared git repo) together into a GitOps-managed paude session.
  tags: ["ai", "agent", "claude", "cursor", "gemini", "paude"]
  annotations:
    backstage.io/techdocs-ref: dir:.
spec:
  type: service
  owner: rhdh-pai
  parameters:
    - title: Agent Identity
      required:
        - name
        - owner
        - role
        - task
        - trigger
      properties:
        name:
          title: Name
          type: string
          description: Session / agent name (e.g. agent-se-impl)
          ui:autofocus: true
          ui:field: EntityNamePicker
          maxLength: 63
        owner:
          title: Owner
          type: string
          description: Owner of the agent component
          default: user:guest
          ui:field: OwnerPicker
          ui:options: {}
        role:
          title: Role
          type: string
          description: Role component — drives system prompt and agent type
          ui:field: EntityPicker
          ui:options:
            catalogFilter:
              kind: Component
              spec.type: paude-agent-role
        task:
          title: Task
          type: string
          description: Task component — drives TASK.md and launch prompt
          ui:field: EntityPicker
          ui:options:
            catalogFilter:
              kind: Component
              spec.type: paude-task
        trigger:
          title: Trigger
          type: string
          description: When this agent starts
          enum:
            - manual
            - pr-opened
            - ci-passed
            - pr-merged
          enumNames:
            - Manual (user starts explicitly)
            - PR Opened (upstream agent opens a PR)
            - CI Passed (CI passes on upstream PR)
            - PR Merged (upstream agent's PR is merged)
          default: manual
        triggeredBy:
          title: Triggered By
          type: string
          description: "(Optional) Upstream agent whose event activates this one"
          ui:field: EntityPicker
          ui:options:
            catalogFilter:
              kind: Component
              spec.type: paude-agent

    - title: Shared Repository
      required:
        - projectRepo
      properties:
        projectRepo:
          title: Paude Project Repository
          type: string
          description: The shared paude project repository all agents in this workflow write to
          ui:field: EntityPicker
          ui:options:
            catalogFilter:
              kind: Component
              spec.type: paude-project

    - title: OpenShift Deployment
      required:
        - namespace
        - argoInstance
        - argoNS
        - argoProject
        - pvcSize
        - allowedDomains
        - yolo
        - githubServer
        - repoOwner
        - repoName
        - branch
      properties:
        namespace:
          title: Deployment Namespace
          type: string
          description: The OpenShift namespace where the agent will be deployed
          default: rhdh-app
          maxLength: 63
        argoInstance:
          title: ArgoCD Instance
          type: string
          description: The ArgoCD instance name configured in RHDH
          default: default
          maxLength: 63
        argoNS:
          title: ArgoCD Namespace
          type: string
          description: The namespace where the ArgoCD Application will be created
          default: openshift-gitops
          maxLength: 63
        argoProject:
          title: ArgoCD Project
          type: string
          description: The ArgoCD project name
          default: default
          maxLength: 63
        pvcSize:
          title: Workspace PVC Size
          type: string
          description: Size of the persistent volume for the agent's workspace
          default: 10Gi
          ui:help: "10Gi is sufficient for most projects."
        storageClass:
          title: Storage Class
          type: string
          description: "(Optional) Storage class override for the workspace PVC"
        allowedDomains:
          title: Allowed Network Domains
          type: string
          description: Space-separated list of allowed domain aliases for the agent's network proxy
          default: default
          ui:help: "Built-in aliases: default, python, github, golang, nodejs, rust."
        extraPackages:
          title: Extra OS Packages
          type: string
          description: "(Optional) Space-separated OS packages to install into the agent container"
        yolo:
          title: Enable Autonomous Mode (yolo)?
          type: boolean
          default: true
          ui:help: "Enables --dangerously-skip-permissions. The agent runs without requiring approval for each action."
        githubServer:
          title: GitHub Server
          type: string
          default: github.com
          ui:help: "You can also provide an on-prem GitHub server, e.g. github.example.com"
        repoOwner:
          title: Repository Owner
          type: string
          ui:help: The organization or user that the GitOps repository will belong to
        repoName:
          title: Repository Name
          type: string
          description: Name for the GitOps repository (e.g. paude-agent-se-gitops)
        branch:
          title: Default Branch
          type: string
          default: main

  steps:
    - id: fetch-role
      name: Fetch Role Entity
      action: catalog:fetch
      input:
        entityRef: ${{ parameters.role }}

    - id: fetch-task
      name: Fetch Task Entity
      action: catalog:fetch
      input:
        entityRef: ${{ parameters.task }}

    - id: fetch-project-repo
      name: Fetch Project Repository Entity
      action: catalog:fetch
      input:
        entityRef: ${{ parameters.projectRepo }}

    - id: fetch-skeleton
      name: Fetch Skeleton
      action: fetch:template
      input:
        url: ./skeleton
        targetPath: gitops
        values:
          name: ${{ parameters.name }}
          owner: ${{ parameters.owner }}
          role: ${{ parameters.role }}
          task: ${{ parameters.task }}
          projectRepo: ${{ parameters.projectRepo }}
          trigger: ${{ parameters.trigger }}
          triggeredBy: ${{ parameters.triggeredBy }}
          # From catalog:fetch (role)
          agentType: ${{ steps['fetch-role'].output.entity.spec.agentType }}
          systemPrompt: ${{ steps['fetch-role'].output.entity.spec.systemPrompt }}
          # From catalog:fetch (task)
          taskTitle: ${{ steps['fetch-task'].output.entity.spec.title }}
          taskDescription: ${{ steps['fetch-task'].output.entity.spec.description }}
          taskObjectives: ${{ steps['fetch-task'].output.entity.spec.objectives }}
          taskAcceptanceCriteria: ${{ steps['fetch-task'].output.entity.spec.acceptanceCriteria }}
          # From catalog:fetch (projectRepo)
          workBranch: ${{ steps['fetch-project-repo'].output.entity.spec.workBranch }}
          projectRepoUrl: ${{ steps['fetch-project-repo'].output.entity.spec.repoUrl }}
          # Deployment params
          namespace: ${{ parameters.namespace }}
          argoNS: ${{ parameters.argoNS }}
          argoProject: ${{ parameters.argoProject }}
          pvcSize: ${{ parameters.pvcSize }}
          storageClass: ${{ parameters.storageClass }}
          allowedDomains: ${{ parameters.allowedDomains }}
          extraPackages: ${{ parameters.extraPackages }}
          yolo: ${{ parameters.yolo }}
          repoURL: https://${{ parameters.githubServer }}/${{ parameters.repoOwner }}/${{ parameters.repoName }}
          branch: ${{ parameters.branch }}

    - id: publish-github
      name: Publish GitOps Repository to GitHub
      action: publish:github
      input:
        sourcePath: gitops
        description: GitOps repository for Paude agent ${{ parameters.name }}
        repoUrl: ${{ parameters.githubServer }}?owner=${{ parameters.repoOwner }}&repo=${{ parameters.repoName }}
        defaultBranch: ${{ parameters.branch }}
        protectDefaultBranch: false
        repoVisibility: public

    - id: wait-for-github-repository
      name: Waiting for Repository Availability
      action: debug:wait
      input:
        seconds: 3

    - id: register
      name: Register
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish-github'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

    - id: create-argocd-resources
      name: Create ArgoCD Resources
      action: argocd:create-resources
      input:
        appName: ${{ parameters.name }}
        argoInstance: ${{ parameters.argoInstance }}
        namespace: ${{ parameters.argoNS }}
        repoUrl: https://${{ parameters.githubServer }}/${{ parameters.repoOwner }}/${{ parameters.repoName }}.git
        path: ./argocd

    - id: fetch-pipeline-entry
      name: Render Pipeline Entry
      action: fetch:template
      input:
        url: ./pipeline-entry-skeleton
        targetPath: pipeline-entry
        values:
          name: ${{ parameters.name }}
          namespace: ${{ parameters.namespace }}
          trigger: ${{ parameters.trigger }}
          triggeredBy: ${{ parameters.triggeredBy }}
          workBranch: ${{ steps['fetch-project-repo'].output.entity.spec.workBranch }}

    - id: rename-pipeline-entry
      name: Rename Pipeline Entry File
      action: fs:rename
      input:
        files:
          - from: pipeline-entry/agent.yaml
            to: pipeline-entry/${{ parameters.name }}.yaml

    - id: register-in-pipeline
      name: Register Agent in Pipeline Config
      action: publish:github:pull-request
      input:
        repoUrl: ${{ steps['fetch-project-repo'].output.entity.spec.githubServer }}?owner=${{ steps['fetch-project-repo'].output.entity.spec.repoOwner }}&repo=${{ steps['fetch-project-repo'].output.entity.spec.repoName }}
        branchName: add-agent-${{ parameters.name }}
        title: "feat: register agent ${{ parameters.name }} in pipeline"
        description: |
          Adds agent `${{ parameters.name }}` to the project pipeline.

          - trigger: `${{ parameters.trigger }}`
          - triggeredBy: `${{ parameters.triggeredBy }}`

          Merge this PR to activate the agent in the Tekton pipeline.
        sourcePath: pipeline-entry
        targetPath: agents

  output:
    links:
      - title: GitOps Repository
        url: ${{ steps['publish-github'].output.remoteUrl }}
      - title: Open Component in Catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
      - title: Pipeline Registration PR
        url: ${{ steps['register-in-pipeline'].output.remoteUrl }}
