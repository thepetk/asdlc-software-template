apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: paude-agent
  title: Paude Agent
  description: Deploy a containerized AI coding agent (Claude, Cursor, Gemini, or OpenClaw) on OpenShift using Paude.
  tags: ["ai", "agent", "claude", "cursor", "gemini", "openclaw", "paude"]
  annotations:
    backstage.io/techdocs-ref: dir:.
spec:
  type: service
  owner: rhdh-pai
  parameters:
    - title: Agent Information
      required:
        - name
        - owner
        - agentType
        - agentRole
        - allowedDomains
      properties:
        name:
          title: Name
          type: string
          description: Unique name of the agent component
          ui:autofocus: true
          ui:field: EntityNamePicker
          maxLength: 63
        owner:
          title: Owner
          type: string
          description: Owner of the agent component
          default: user:guest
          ui:field: OwnerPicker
          ui:options: {}
        agentType:
          title: Agent Type
          type: string
          description: The AI coding agent to deploy
          enum:
            - claude
            - cursor
            - gemini
            - openclaw
          enumNames:
            - Claude Code
            - Cursor
            - Gemini CLI
            - OpenClaw
          default: claude
        agentRole:
          title: Agent Role
          type: string
          description: Describe the agent's role and mission (e.g. "You are a DevOps expert. Help maintain and improve our CI/CD pipelines.")
          ui:widget: textarea
          ui:options:
            rows: 4
        yoloMode:
          title: Enable Autonomous Mode (yolo)?
          type: boolean
          default: false
          ui:help: "Enables --dangerously-skip-permissions for Claude Code. The agent will run without requiring approval for each action. Only applies to Claude."
        allowedDomains:
          title: Allowed Network Domains
          type: string
          description: Space-separated list of allowed domain aliases for the agent's network proxy
          default: default
          ui:help: "Built-in aliases: default, python, github, golang, nodejs, rust. Add custom domains as needed."

    - title: Provider & Credentials
      required:
        - apiKeySecretName
      properties:
        apiKeySecretName:
          title: Credentials Secret Name
          type: string
          description: Name of the Kubernetes Secret in the target namespace that contains your API credentials
          ui:help: "Pre-create this secret before running the template. All keys in the secret become environment variables in the container (e.g. ANTHROPIC_API_KEY for Claude, OPENAI_API_KEY for OpenClaw with OpenAI, CURSOR_API_KEY for Cursor)."

    - title: Repository Information
      required:
        - repoOwner
        - repoName
        - branch
        - githubServer
      properties:
        githubServer:
          title: GitHub Server
          type: string
          default: github.com
          ui:help: "You can also provide an on-prem GitHub server, e.g. github.example.com"
        repoOwner:
          title: Repository Owner
          type: string
          ui:help: The organization or user that this repository will belong to
        repoName:
          title: Repository Name
          type: string
        branch:
          title: Default Branch
          type: string
          default: main

    - title: Deployment Information
      required:
        - argoNS
        - argoInstance
        - argoProject
        - namespace
        - pvcSize
      properties:
        argoNS:
          title: ArgoCD Namespace
          type: string
          description: The namespace where the ArgoCD Application will be created
          default: openshift-gitops
          maxLength: 63
        argoInstance:
          title: ArgoCD Instance
          type: string
          description: The ArgoCD instance name configured in RHDH
          default: default
          maxLength: 63
        argoProject:
          title: ArgoCD Project
          type: string
          description: The ArgoCD project name
          default: default
          maxLength: 63
        namespace:
          title: Deployment Namespace
          type: string
          description: The OpenShift namespace where the agent will be deployed
          default: rhdh-app
          maxLength: 63
        pvcSize:
          title: Workspace PVC Size
          type: string
          description: Size of the persistent volume for the agent's workspace
          default: 10Gi
          ui:help: "The agent's code workspace will be stored here. 10Gi is sufficient for most projects."
        deployArgoCDApplicationOnRemoteCluster:
          title: Deploy on Remote Cluster?
          type: boolean
          default: false
          ui:help: "If selected, the agent will be deployed to a remote cluster. Ensure the remote cluster is already configured in RHDH."
      dependencies:
        deployArgoCDApplicationOnRemoteCluster:
          oneOf:
            - required:
                - remoteClusterAPIUrl
                - remoteClusterDeploymentNamespace
              properties:
                deployArgoCDApplicationOnRemoteCluster:
                  const: true
                remoteClusterAPIUrl:
                  title: Remote Cluster API URL
                  type: string
                  ui:help: "Kube API URL of the remote cluster"
                remoteClusterDeploymentNamespace:
                  title: Remote Cluster Namespace
                  type: string
                  ui:help: "The namespace on the remote cluster where the agent will be deployed"
            - properties:
                deployArgoCDApplicationOnRemoteCluster:
                  const: false

  steps:
    - id: fetch-skeleton
      name: Fetch Skeleton
      action: fetch:template
      input:
        url: ./skeleton
        targetPath: gitops
        values:
          name: ${{ parameters.name }}
          owner: ${{ parameters.owner }}
          agentType: ${{ parameters.agentType }}
          agentRole: ${{ parameters.agentRole }}
          yoloMode: ${{ parameters.yoloMode }}
          allowedDomains: ${{ parameters.allowedDomains }}
          apiKeySecretName: ${{ parameters.apiKeySecretName }}
          namespace: ${{ parameters.remoteClusterDeploymentNamespace if parameters.deployArgoCDApplicationOnRemoteCluster else parameters.namespace }}
          repoURL: https://${{ parameters.githubServer }}/${{ parameters.repoOwner }}/${{ parameters.repoName }}
          argoComponentOverlays: ./components/${{ parameters.name }}/overlays
          argoNS: ${{ parameters.argoNS }}
          argoProject: ${{ parameters.argoProject }}
          pvcSize: ${{ parameters.pvcSize }}
          deployOnRemoteCluster: ${{ parameters.deployArgoCDApplicationOnRemoteCluster }}
          remoteClusterAPIUri: ${{ parameters.remoteClusterAPIUrl }}

    - id: renameComponentDir
      name: Rename Component Directory
      action: fs:rename
      input:
        files:
          - from: gitops/components/http
            to: gitops/components/${{ parameters.name }}
            overwrite: true

    - id: publish-github
      name: Publish Repository to GitHub
      action: publish:github
      input:
        sourcePath: gitops
        description: GitOps repository for Paude agent ${{ parameters.name }}
        repoUrl: ${{ parameters.githubServer }}?owner=${{ parameters.repoOwner }}&repo=${{ parameters.repoName }}
        defaultBranch: ${{ parameters.branch }}
        protectDefaultBranch: false
        repoVisibility: public

    - id: wait-for-github-repository
      name: Waiting for Repository Availability
      action: debug:wait
      input:
        seconds: 3

    - id: register
      name: Register
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish-github'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

    - id: create-argocd-resources
      name: Create ArgoCD Resources
      action: argocd:create-resources
      input:
        appName: ${{ parameters.name }}-app-of-apps
        argoInstance: ${{ parameters.argoInstance }}
        namespace: ${{ parameters.argoNS }}
        repoUrl: https://${{ parameters.githubServer }}/${{ parameters.repoOwner }}/${{ parameters.repoName }}.git
        path: ./app-of-apps

  output:
    links:
      - title: GitOps Repository
        url: ${{ steps['publish-github'].output.remoteUrl }}
      - title: Open Component in Catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
