apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ${{ values.name }}
  description: "Assignment of ${{ values.task }} to ${{ values.agent }}"
  annotations:
    backstage.io/techdocs-ref: dir:.
    paude.io/assigned-agent: ${{ values.agent }}
    paude.io/assigned-task: ${{ values.task }}
    paude.io/assignment-status: ${{ values.status }}
    paude.io/assignment-comment: "${{ values.comment }}"
spec:
  type: agent-task-assignment
  owner: ${{ values.owner }}
  lifecycle: experimental
