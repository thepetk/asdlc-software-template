apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: paude-task
  title: Paude Task
  description: Create and register an agent task in RHDH.
  tags: ["ai", "agent", "task", "paude"]
  annotations:
    backstage.io/techdocs-ref: dir:.
spec:
  type: service
  owner: rhdh-pai
  parameters:
    - title: Task Information
      required:
        - name
        - owner
        - title
        - description
        - objectives
        - acceptanceCriteria
      properties:
        name:
          title: Name
          type: string
          description: Unique name for this task (e.g. implement-feature-x)
          ui:autofocus: true
          ui:field: EntityNamePicker
          maxLength: 63
        owner:
          title: Owner
          type: string
          description: Owner of the task
          default: user:guest
          ui:field: OwnerPicker
          ui:options: {}
        title:
          title: Title
          type: string
          description: Human-readable title for this task (e.g. "Implement Feature X")
        description:
          title: Description
          type: string
          description: What this task is about
          ui:widget: textarea
          ui:options:
            rows: 3
        objectives:
          title: Objectives
          type: array
          description: Ordered list of objectives the agent must achieve
          items:
            type: string
            title: Objective
          ui:ArrayFieldTemplate: ArrayFieldTemplate
        acceptanceCriteria:
          title: Acceptance Criteria
          type: array
          description: Conditions that must be met for the task to be considered complete
          items:
            type: string
            title: Criterion
          ui:ArrayFieldTemplate: ArrayFieldTemplate

    - title: Catalog Repository
      description: The task's catalog-info.yaml will be added to this repository via a pull request. Once merged, the task becomes available in the RHDH catalog.
      required:
        - catalogRepoOwner
        - catalogRepoName
        - catalogGithubServer
      properties:
        catalogGithubServer:
          title: GitHub Server
          type: string
          default: github.com
        catalogRepoOwner:
          title: Repository Owner
          type: string
          description: Owner of the catalog repository
        catalogRepoName:
          title: Repository Name
          type: string
          description: Name of the catalog repository (e.g. paude-software-template)

  steps:
    - id: fetch-skeleton
      name: Fetch Skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          owner: ${{ parameters.owner }}
          title: ${{ parameters.title }}
          description: ${{ parameters.description }}
          objectives: ${{ parameters.objectives }}
          acceptanceCriteria: ${{ parameters.acceptanceCriteria }}

    - id: publish-pr
      name: Open Pull Request
      action: publish:github:pull-request
      input:
        repoUrl: ${{ parameters.catalogGithubServer }}?owner=${{ parameters.catalogRepoOwner }}&repo=${{ parameters.catalogRepoName }}
        branchName: add-task-${{ parameters.name }}
        title: "feat: add task ${{ parameters.name }}"
        description: |
          Adds the **${{ parameters.title }}** task to the catalog.

          Merge this PR to make the task available in RHDH.
        sourcePath: .
        targetPath: examples/${{ parameters.name }}

  output:
    links:
      - title: Open Pull Request
        url: ${{ steps['publish-pr'].output.remoteUrl }}
