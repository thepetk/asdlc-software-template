apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: paude-agent-group
  title: Paude Agent Group
  description: Define and register a group of Paude agents in RHDH.
  tags: ["ai", "agent", "group", "paude"]
  annotations:
    backstage.io/techdocs-ref: dir:.
spec:
  type: service
  owner: rhdh-pai
  parameters:
    - title: Group Information
      required:
        - name
        - owner
        - title
        - description
        - objectives
        - agents
      properties:
        name:
          title: Name
          type: string
          description: Unique name for this agent group
          ui:autofocus: true
          ui:field: EntityNamePicker
          maxLength: 63
        owner:
          title: Owner
          type: string
          description: Owner of the group
          default: user:guest
          ui:field: OwnerPicker
          ui:options: {}
        title:
          title: Group Title
          type: string
          description: Human-readable title for this group (e.g. "Platform Team Agents")
        description:
          title: Description
          type: string
          description: Overview of what this agent group does
          ui:widget: textarea
          ui:options:
            rows: 3
        objectives:
          title: Objectives
          type: array
          description: Shared objectives for the group
          items:
            type: string
            title: Objective
          ui:ArrayFieldTemplate: ArrayFieldTemplate
        agents:
          title: Agents
          type: array
          description: Agents to include in this group
          items:
            type: string
            title: Agent
            ui:field: EntityPicker
            ui:options:
              catalogFilter:
                - kind: Component
                  spec.type: agent
              defaultKind: Component
          ui:ArrayFieldTemplate: ArrayFieldTemplate

    - title: Repository Information
      required:
        - repoOwner
        - repoName
        - branch
        - githubServer
      properties:
        githubServer:
          title: GitHub Server
          type: string
          default: github.com
          ui:help: "You can also provide an on-prem GitHub server, e.g. github.example.com"
        repoOwner:
          title: Repository Owner
          type: string
          ui:help: The organization or user that this repository will belong to
        repoName:
          title: Repository Name
          type: string
        branch:
          title: Default Branch
          type: string
          default: main

  steps:
    - id: fetch-skeleton
      name: Fetch Skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          owner: ${{ parameters.owner }}
          title: ${{ parameters.title }}
          description: ${{ parameters.description }}
          objectives: ${{ parameters.objectives }}
          agents: ${{ parameters.agents }}

    - id: publish-github
      name: Publish Repository to GitHub
      action: publish:github
      input:
        description: Paude agent group ${{ parameters.name }}
        repoUrl: ${{ parameters.githubServer }}?owner=${{ parameters.repoOwner }}&repo=${{ parameters.repoName }}
        defaultBranch: ${{ parameters.branch }}
        protectDefaultBranch: false
        repoVisibility: public

    - id: register
      name: Register
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish-github'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: Repository
        url: ${{ steps['publish-github'].output.remoteUrl }}
      - title: Open Group in Catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
