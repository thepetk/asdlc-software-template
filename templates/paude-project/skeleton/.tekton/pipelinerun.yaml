apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: ${{ values.name }}-orchestrate
  namespace: ${{ values.argoNS }}
  annotations:
    pipelinesascode.tekton.dev/on-event: "[push, pull_request, check_suite]"
    pipelinesascode.tekton.dev/on-target-branch: "[${{ values.defaultBranch }}]"
    pipelinesascode.tekton.dev/max-keep-runs: "5"
spec:
  params:
    - name: revision
      value: "{{ revision }}"
    - name: repo_url
      value: "{{ repo_url }}"
    - name: event_type
      value: "{{ event_type }}"
    - name: pr_number
      value: "{{ pull_request_number }}"
    - name: source_branch
      value: "{{ source_branch }}"
    - name: pr_action
      value: "{{ action }}"
    - name: check_suite_conclusion
      value: "{{ check_suite_conclusion }}"
  workspaces:
    - name: source
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi
  pipelineSpec:
    params:
      - name: revision
        type: string
      - name: repo_url
        type: string
      - name: event_type
        type: string
        description: "GitHub event type: push, pull_request, check_suite"
      - name: pr_number
        type: string
        default: ""
      - name: source_branch
        type: string
        default: ""
      - name: pr_action
        type: string
        default: ""
      - name: check_suite_conclusion
        type: string
        default: ""
    workspaces:
      - name: source
    tasks:
      - name: clone
        taskRef:
          resolver: cluster
          params:
            - name: kind
              value: task
            - name: name
              value: git-clone
            - name: namespace
              value: openshift-pipelines
        params:
          - name: url
            value: $(params.repo_url)
          - name: revision
            value: $(params.revision)
        workspaces:
          - name: output
            workspace: source

      - name: resolve-next
        runAfter: [clone]
        taskSpec:
          params:
            - name: event_type
            - name: pr_action
            - name: check_suite_conclusion
            - name: source_branch
            - name: pr_number
          results:
            - name: agentName
              description: Name of the agent to trigger, or empty if none
            - name: agentNamespace
              description: Namespace of the agent to trigger
            - name: agentStatefulset
              description: StatefulSet name of the agent to trigger
          steps:
            - name: resolve
              image: quay.io/openshift/origin-cli:latest
              script: |
                #!/usr/bin/env bash
                set -euo pipefail

                CONFIG=/workspace/source/pipeline-config.yaml

                # Determine the effective trigger type from the GitHub event
                EVENT="$(params.event_type)"
                CONCLUSION="$(params.check_suite_conclusion)"
                ACTION="$(params.pr_action)"

                if [[ "$EVENT" == "push" ]]; then
                  TRIGGER_TYPE="push"
                elif [[ "$EVENT" == "pull_request" && "$ACTION" == "opened" ]]; then
                  TRIGGER_TYPE="pr-opened"
                elif [[ "$EVENT" == "pull_request" && "$ACTION" == "closed" ]]; then
                  TRIGGER_TYPE="pr-merged"
                elif [[ "$EVENT" == "check_suite" && "$CONCLUSION" == "success" ]]; then
                  TRIGGER_TYPE="ci-passed"
                else
                  echo "No matching trigger type for event=$EVENT action=$ACTION conclusion=$CONCLUSION"
                  printf "" > $(results.agentName.path)
                  printf "" > $(results.agentNamespace.path)
                  printf "" > $(results.agentStatefulset.path)
                  exit 0
                fi

                # Parse agents/*.yaml files with python (available on the image)
                python3 - <<'PYEOF'
                import yaml, sys, os, glob

                agents_dir = "/workspace/source/agents"
                trigger_type = os.environ.get("TRIGGER_TYPE", "")
                pr_number = os.environ.get("PR_NUMBER", "")
                source_branch = os.environ.get("SOURCE_BRANCH", "")

                agents = []
                for path in sorted(glob.glob(f"{agents_dir}/*.yaml")):
                    with open(path) as f:
                        agent = yaml.safe_load(f)
                        if agent:
                            agents.append(agent)

                matched = None
                for agent in agents:
                    if agent.get("trigger") == trigger_type:
                        matched = agent
                        break

                if matched:
                    print(f"Matched agent: {matched['name']}")
                    with open(os.environ["AGENT_NAME_PATH"], "w") as f:
                        f.write(matched["name"])
                    with open(os.environ["AGENT_NS_PATH"], "w") as f:
                        f.write(matched.get("namespace", ""))
                    with open(os.environ["AGENT_SS_PATH"], "w") as f:
                        f.write(matched.get("statefulset", matched["name"]))
                else:
                    print(f"No agent matched trigger={trigger_type}")
                    for path in [os.environ["AGENT_NAME_PATH"], os.environ["AGENT_NS_PATH"], os.environ["AGENT_SS_PATH"]]:
                        open(path, "w").close()
                PYEOF
              env:
                - name: TRIGGER_TYPE
                  value: "$(params.event_type)"
                - name: PR_NUMBER
                  value: "$(params.pr_number)"
                - name: SOURCE_BRANCH
                  value: "$(params.source_branch)"
                - name: AGENT_NAME_PATH
                  value: $(results.agentName.path)
                - name: AGENT_NS_PATH
                  value: $(results.agentNamespace.path)
                - name: AGENT_SS_PATH
                  value: $(results.agentStatefulset.path)
        workspaces:
          - name: source
            workspace: source
        params:
          - name: event_type
            value: $(params.event_type)
          - name: pr_action
            value: $(params.pr_action)
          - name: check_suite_conclusion
            value: $(params.check_suite_conclusion)
          - name: source_branch
            value: $(params.source_branch)
          - name: pr_number
            value: $(params.pr_number)

      - name: inject-context
        runAfter: [resolve-next]
        when:
          - input: $(tasks.resolve-next.results.agentName)
            operator: notin
            values: [""]
        taskSpec:
          params:
            - name: agentName
            - name: agentNamespace
            - name: agentStatefulset
            - name: pr_number
            - name: source_branch
          steps:
            - name: patch
              image: quay.io/openshift/origin-cli:latest
              script: |
                #!/usr/bin/env bash
                set -euo pipefail

                AGENT_ARGS="-p \"Read TASK.md."
                if [[ -n "$(params.pr_number)" ]]; then
                  AGENT_ARGS="${AGENT_ARGS} The upstream PR is #$(params.pr_number) on $(params.source_branch)."
                fi
                AGENT_ARGS="${AGENT_ARGS}\" --dangerously-skip-permissions"

                oc patch statefulset "$(params.agentStatefulset)" \
                  -n "$(params.agentNamespace)" \
                  --type=merge \
                  -p "{\"spec\":{\"template\":{\"spec\":{\"containers\":[{\"name\":\"agent\",\"env\":[{\"name\":\"PAUDE_AGENT_ARGS\",\"value\":\"${AGENT_ARGS}\"}]}]}}}}"
        params:
          - name: agentName
            value: $(tasks.resolve-next.results.agentName)
          - name: agentNamespace
            value: $(tasks.resolve-next.results.agentNamespace)
          - name: agentStatefulset
            value: $(tasks.resolve-next.results.agentStatefulset)
          - name: pr_number
            value: $(params.pr_number)
          - name: source_branch
            value: $(params.source_branch)

      - name: start-agent
        runAfter: [inject-context]
        when:
          - input: $(tasks.resolve-next.results.agentName)
            operator: notin
            values: [""]
        taskSpec:
          params:
            - name: agentStatefulset
            - name: agentNamespace
          steps:
            - name: scale
              image: quay.io/openshift/origin-cli:latest
              script: |
                #!/usr/bin/env bash
                set -euo pipefail
                oc scale statefulset/"$(params.agentStatefulset)" \
                  -n "$(params.agentNamespace)" \
                  --replicas=1
        params:
          - name: agentStatefulset
            value: $(tasks.resolve-next.results.agentStatefulset)
          - name: agentNamespace
            value: $(tasks.resolve-next.results.agentNamespace)

      - name: notify
        runAfter: [start-agent]
        when:
          - input: $(tasks.resolve-next.results.agentName)
            operator: notin
            values: [""]
        taskSpec:
          params:
            - name: agentName
            - name: event_type
            - name: pr_number
            - name: source_branch
          steps:
            - name: post-webhook
              image: quay.io/curl/curl:latest
              script: |
                #!/usr/bin/env sh
                set -eu
                echo "Paude pipeline notification:"
                echo "  event:   $(params.event_type)"
                echo "  branch:  $(params.source_branch)"
                echo "  PR:      $(params.pr_number)"
                echo "  started: $(params.agentName)"
        params:
          - name: agentName
            value: $(tasks.resolve-next.results.agentName)
          - name: event_type
            value: $(params.event_type)
          - name: pr_number
            value: $(params.pr_number)
          - name: source_branch
            value: $(params.source_branch)
