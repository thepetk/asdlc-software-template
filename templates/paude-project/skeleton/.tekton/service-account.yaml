apiVersion: v1
kind: ServiceAccount
metadata:
  name: ${{ values.name }}-tekton-triggers-sa
  namespace: ${{ values.tektonNS }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ${{ values.name }}-tekton-triggers-role
  namespace: ${{ values.tektonNS }}
rules:
  - apiGroups: ["triggers.tekton.dev"]
    resources: ["eventlisteners", "triggerbindings", "triggertemplates", "triggers", "interceptors"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["tekton.dev"]
    resources: ["pipelineruns"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ${{ values.name }}-tekton-triggers-rolebinding
  namespace: ${{ values.tektonNS }}
subjects:
  - kind: ServiceAccount
    name: ${{ values.name }}-tekton-triggers-sa
    namespace: ${{ values.tektonNS }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ${{ values.name }}-tekton-triggers-role
